  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
  content: "That wee video has certainly got some response — emails and comments are\
    \ coming in quicker than I can respond. Thanks to David and Stephanie Hunter for\
    \ all your work and input. I have\n seen David work those dowsing rods with remarkable\
    \ effect at ‘Son of \nBlue’ on the grounds of the old Carbrook House just a mile\
    \ from the \nTorwood Blue Water Pool. I would like to see a map of your findings\
    \ and \nput it on the web page with your conclusions. Although I am currently\
    \ \nstill an ‘Airshaft Advocate’, I still have an open mind and have been \ndredging\
    \ the Scotsman Archives and following reports on Loch Coulter \nbeing incorporated\
    \ into the Falkirk & Larbert Water Trust — later \nStirlingshire Water. I can’t\
    \ find any reference of a link to Torwood. I \ndid not research North Third Reservoir.\
    \ You have me fair flummoxed with \nthe tunnel to Carron Iron Works. Thanks to\
    \ James Milne. My best guess is that the manhole and one inch \nmetal pipe were\
    \ later modifications marking a change of use. A pipe \nconnecting Loch Coulter\
    \ or North Third Reservoir to Torwood would \ncertainly have to go deep to get\
    \ under the main Denny to Stirling Road \nor the newer M80 that follows the same\
    \ route. Scotsman newspaper reports\n from 1885 follow the acquisition of Loch\
    \ Coulter for the Falkirk Water \nScheme. It is my understanding that they increased\
    \ the capacity of this \nnatural loch. Thanks for all the interesting links you\
    \ are posting."
