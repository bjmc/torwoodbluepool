- id: 141
  author: James Milne
  date: '2012-01-17T11:40:37+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_012.png
  content: "Finally got to visit the area. I was working from memory and was \non\
    \ a tight schedule. It was peeing it down and blowing a gale – feet \nsoaked running\
    \ up the track to the wood from the south east. Didnt \nrealise there were 3 lots\
    \ of electrity lines crossing the area. got the \nmiddle one – through the dense\
    \ gorse, through the soaking wet heather, \ndisturbed 6 roe deer, lifted a woodcock\
    \ and a male kestrel from feet \nfrom me – cracking view. But no pool – walked\
    \ as far as the wall. Noted \nall the square depressions in the ground – are these\
    \ subsidence related \nfrom the coal mining below ?\n\nMade my way back to the\
    \ car soaked from the waist down ! Got back to \nthe computer and realised my\
    \ mistake – I was within 100m of the pool to \nthe north. … Next time…. Noted\
    \ in the gorge near the road a large waterfall in full spate, with \nalot of concrete\
    \ retaining walls around the area – anybody know reason \nfor all the concrete\
    \ – couldnt get a good view and didnt have time to \nhave a mooch.\n\nAlso went\
    \ to Summerlee industrial Heritage centre. Bit disapointed by\n the girls description\
    \ of the “coal mine” But my 3 year old son enjoyed \nit"
  replies:
