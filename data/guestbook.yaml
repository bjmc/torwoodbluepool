    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Nothing in life is safe Gregor, you can choke on a cup of tea. I have\
      \ lost count of the number of people who say they have swum in the \nBlue Water,\
      \ though the bottom has a lot more debris on it now than ye \nolden days. Although\
      \ I have heard the stories, I have never actually \nseen anyone swimming in\
      \ the Blue Pool and I have never done so myself. Bottom line is that if YOU\
      \ are not confident, then don’t do it. If the water level is down by two or\
      \ three feet, it could be very \ndifficult getting back out of the pool. A Labrador\
      \ dog discovered this a\n few years ago with tragic results. Never swim alone.\
      \ Always have a friend to show the police where yer body is – it saves time"
