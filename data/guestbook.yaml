  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "Mystery solved then – Only thing I’d say in defence of the comment >\n\
    \nA local from Torwood village remembers the Game Keeper in 1960 \ndescribing\
    \ how the pool used to have a Beehive roof that had since \nfallen in and the\
    \ loose bricks were clearly visible on the bottom.\n\nThere are images of air-shafts\
    \ with metal grid roofs – that could be \ndescribed as beehive shaped – perhaps\
    \ the builders put one of these on \nas an extra safeguard. It would most likely\
    \ have been a metal grid \nrather than brick though.\n\nExamples can be seen here\
    \ > A shaft (image source http://industrialgwent.co.uk/Images/RV%20DarranOgilvieCollieryairshaft-1600.jpg\
    \ ) from Ogilvie Colliery in Wales And here > A shaft (image source : http://waterwayroutes.co.uk/blog/2007/09/\
    \ ) from a canal tunnel"
  replies:
  - id: 132
    author: Nigel Turnbull
    date: '2011-10-28T11:32:50+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Andy, I have seen photographs of air shafts with domed metal grid\n\
      \ covers. Whether Torwood Blue ever had one, we will probably never know \n\
      but the one and only account of the Beehive Roof specifically refers to \nthe\
      \ Bricks at the bottom of the Pool being the remnants of the Beehive \nRoof.\
      \ Nigel"
    replies: []
