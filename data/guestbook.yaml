    date: '2012-01-28T11:48:16+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Robert, the manhole is still a mystery. It seems to line up with a\n\
      \ short stub of 1” iron pipe that sticks out the bottom of the pool and \npoints\
      \ towards the arch. There may have been an outbuilding with a wood fired boiler\
      \ that \nsupplied steam via a shut-off valve 3 metre underground in the manhole.\
      \ The steam could have been used to power maintenance equipment in the \nairshaft\
      \ or if, when the Pit closed around 1910 and the shaft flooded, \nsomeone converted\
      \ it to a Spa/Pool and the steam was for heating the \nPool for a few hours\
      \ before the gentry took their dip. Nigel"
    replies:
    - id: 150
      author: David Hunter
      date: '2012-01-28T11:49:02+00:00'
      avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
      content: "ok Dave is thinking out loud again Nigel! this is not closed the \n\
        facts are the pit head at Plean cross road has coke kilens the buy \nproduct\
        \ of coke is coal gas less than a mile away Carbrooke House has a \ngasometer\
        \ FACTS!!!! The pit head (gasometer) and the blue pool are all \nthe same\
        \ brick and 99.9% sure they are all linked by tunnel. Why was the\n pit producing\
        \ coke (coal gas)"
      replies:
      - id: 151
        author: Nigel Turnbull
        date: '2012-01-29T11:49:46+00:00'
        avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
        content: "Hi Dave. Hopefully we can meet up this year so you can give me a\
          \ \ntour of the Plean Kilns which were, I think, next to Plean Number 3\
          \ \nShaft. It would be good to get some photos. I have always assumed that\
          \ \nthese large Coking Kilns produced Coke to be used in Iron Foundries\
          \ for \nsmelting as it can burn at higher temperatures than coal. The gas\
          \ is \nindeed a by-product which could either be sold to users in the immediate\n\
          \ vicinity or simply feed gas-burners to heat the Kilns. I can’t imagine\
          \ why there would be interconnecting tunnels. As for the \nbricks all being\
          \ the same — they may have been sourced from the same \nnearest local brickworks.\
          \ Nigel"
        replies: []
