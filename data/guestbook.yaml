- id: 155
  author: Richard Holmes
  date: '2012-03-04T11:53:20+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "I went up to see the blue pool with our walking group on Saturday 03 March\
    \ 2012.\n\nThe pool had bluish clear water and sparse weed. I thought I saw two\
    \ \nbrick arches, one on the north side and the other on the south side. The\n\
    \ site intrigued me.\n\nIn mind of Guestbook site previous reports of submerged\
    \ pipes, a \nnearby manhole, key etc I find it most easy to think of this site\
    \ as \nhaving had some former industrial reservoir use in Victorian times or \n\
    thereabouts. That is, the pool was purpose built to provide a \ngravity-driven\
    \ head of water which with a requirement also for pure \nwater. A pure head of\
    \ water used for quenching coking ovens, or for \nhospital use?- both sound good\
    \ to me(previous suggestions posted at this\n site). Pure water (with neglible\
    \ dissolved minerals)would also be \nvaluable for supplying clean water to boilers\
    \ to provide power for steam\n engines. I presume that the low pH and low dissolved\
    \ mineral content \nwould militate against mineral scale forming in the boiler\
    \ systems. Pure\n water generating steam power could conceivably have been used\
    \ for \nlifting contaminated water for from mines, quarries and/or lifting \n\
    solids from mines, quarries and/or for mine ventillation.\n\nThe previous Guestbook\
    \ report of concrete staunchions set into the \n(nearby?) country side also points\
    \ to a local history of industrial-size\n incline-based lifting.\n\nMy thoughts\
    \ about a connection to former industrial use do not tie in\n easily with reported\
    \ rapid drops in level unrelated to rainfall. I do \nnot know how to think around\
    \ that problem – unless we are forced to \nthink the almost unthinkable- someone\
    \ is using the water, perhaps \nunwittingly."
  replies: []
