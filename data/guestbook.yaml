- id: 103
  author: James Milne
  date: '2011-10-21T10:55:22+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_012.png
  content: "Hello again Nigel,\n\nI’ve got that friday afternoon….mind wandering over\
    \ to Torwood again \nfeeling. You know how you wonder if its an air shaft related\
    \ to the \ncoal/fireclay mines – I’ve been doing a bit of ferreting about I found\
    \ \nthis image – http://www.flickr.com/photos/rikj/5773582312/in/photostream/\
    \ look at the colour of the water. Orange – I’ve seen this before with \nwater\
    \ that comes out of mines. With the water in the pool being so clear\n and having\
    \ a low iron content, I wonder if the pool is connected to the\n mines ?\n\nI’m\
    \ trolling trough images of coal and fire clay mines on google – \nI’m seeing\
    \ lots of drift mines but no vertical cylindrical shafts.The \nones I do see have\
    \ doors, or remains of doors above. There is alot of \nindustrial debris lying\
    \ about, but the blue pool has very little. You \nmention other mines in the area.\
    \ Is there any industrial archeology at \nthe surface in the vicinity of these\
    \ locations ? I’m thinking if they \nare related and mine related there would\
    \ be more ruined buildings and \nmetal work about ?\n\nhttp://www.topforge.co.uk/Other%20Industries/Deepcar%20Mines.htm\n\
    \nSee above site – look at the colour of the water coming out !\n\nHave you thought\
    \ about contacting the National scottish Mining museum\n – they must have archives\
    \ of coal and fire clay mines and they would \ndefinately have people who know\
    \ mines and could tell you what your \ndealing with ?"
  replies:
  - id: 104
    author: Nigel Turnbull
    date: '2011-10-21T10:56:53+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for that James. The photos of mine workings are first class.\
      \ I am still looking at the link you emailed me http://codesmiths.com/dingbat/lj/200601__/glyn_pit/\
      \ and there is a rising arched tunnel very similar to the Muiravonside Pit Airshaft\
      \ printed earlier in this report. Orange water is usually associated with Iron.\
      \ Quarter Colliery \noriginally worked Ironstone but later dug down to the Bannockburn\
      \ Main \nCoal seam which it was working when it closed in 1910. The lack of\
      \ old buildings, rail and roads around the Pool indicates that it was not a\
      \ production shaft. It’s not an airshaft yet but it seems to be heading that\
      \ way. Nigel"
    replies: []
- id: 105
  author: Robert Murray
  date: '2011-10-22T10:57:44+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "The pit (blue pool) could possibly have housed a beam engine and \nthe\
    \ chamber a fan with the shaft behind it running down towards the pit \nworkings.\
    \ If that were the case then there would have had to be an \naccess stair around\
    \ or a ladder to the pit/pool floor and probably a \nhatch on the roof near the\
    \ fan. That said I have a problem with this \nbeing built so far away from the\
    \ pithead, unless it doubled as an escape\n road which would have required a fairly\
    \ gentle gradient."
  replies:
  - id: 106
    author: Nigel Turnbull
    date: '2011-10-22T10:59:04+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks Robert. IF! it is an airshaft/tunnel, was it natural draft\n\
      \ or power fan? The distance of one mile from the production shaft to the\n\
      \ Pool certainly gives pause for thought. I have now managed to find \nwhere\
      \ magnetic north was at the time of the disaster in 1895 when the \ndrawing\
      \ of the workings was done. I hope to rotate and overlay it on a \nmodern map\
      \ to see how the Pool might fit into the picture. Nigel"
    replies:
    - id: 107
      author: Robert Murray
      date: '2011-10-23T11:00:15+00:00'
      avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
      content: "I don’t think there was such a thing as as ‘natural draft’. Mining\
        \ engineering took its place. Mine ventilation was carefully \nengineered\
        \ as illustrated by the plan of the 1895 disaster where the air\n flow across\
        \ the workings from the downcast and upcast shafts is seen. Closed doors,\
        \ curtains, bits of wood, anything to control the draught – in the proper\
        \ direction.\n\nNo mention of anything from the direction of Torwood."
      replies: []
