    date: '2010-05-03T09:33:27+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for the Clay Theory Alexander. I won’t rule it out but I \nrather\
      \ favour the idea that water absorbs the longer Red and Green \nwavelengths\
      \ of light, allowing Blue to pass the furthest. The light \ntravels 2×4=8metres\
      \ and the crystal clear water takes on a blue hue. Unfortunately the bottom\
      \ is covered in dark weed that is absorbing most \nof the light and the pool\
      \ currently is more black than blue. Remember to\n discount any reflection of\
      \ the blue sky. We have a diver on possible request but he would be wasting\
      \ his time at \nthe moment. As soon as there is any disturbance of the bottom\
      \ – \nespecially around the arch – the water clouds over almost instantly. I\
      \ \nneed to brush the area clean around the arch before it would be worth \n\
      diving – I clean a wee bit every time I am up there and it takes the \nwater\
      \ a day or two to go clear again. If you fancy grappling some of those old trees\
      \ out, be my guest – be \nwarned they are very slimy and stinking – I have removed\
      \ one already. If you find a brass plaque with the name of a coal company, please\
      \ advise me immediately. I tend to arrive at the Blue Pool just when I get a\
      \ spare hour or two \nand it is impossible (at the moment) to predict this in\
      \ advance. Maybe \nin three weeks or thereabouts I will be better able to specify\
      \ a day and\n time to meet you there."
    replies: []
