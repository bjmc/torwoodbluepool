  author: Bertie Broomfield
  date: '2010-08-26T10:04:31+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "Hi, I think that this is an irrigation well for the plantation \nall around\
    \ the site of the Blue Hole. Its basically a way of keeping a \nsteady flow of\
    \ water to feed the trees where the soil doesn’t hold the \nwater too well. Perhaps\
    \ similar in some way to this http://www.lboro.ac.uk/well/resources/technical-briefs/42-small-scale-irrigation-design.pdf\
    \ However the chances of me coming along and solving this mystery are pretty slim\
    \ so i’m fully prepared to be shot down in flames.\n\nShould we be looking at\
    \ irrigation well deigns of the 19th century???"
  replies:
  - id: 60
    author: Nigel Turnbull
    date: '2010-08-29T10:08:00+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks Bertie. The investigation is still wide open. Your idea of\n\
      \ an irrigation system is an interesting one. One of my early theories \nwas\
      \ just the opposite of that. I thought it might have been a drainage \nsump\
      \ for draining the surrounding boggy land. The ground in that area is\n pretty\
      \ wet most of the year. Earlier this year, a farmer was putting in\n even more\
      \ drainage next to the main path. I have read of drainage being\n added about\
      \ 100 years ago. There are several small streams (‘Rises’ on \nthe old maps)\
      \ that come to the surface in that area."
    replies: []
- id: 61
  author: Nigel Turnbull
  date: '2010-08-29T10:08:51+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
  content: "No matter what theory anyone comes up with, it must address the question,\
    \ “What was the purpose of the large arch?” I will try to get a line drawing with\
    \ sizes up as soon as I get time. Please keep the ideas coming.\n\nBeing from\
    \ Dunipace, I know this feature as The Blue Pool. As this \ninvestigation has\
    \ progressed, I have found there are more people \n(Plean&Torwood area) who know\
    \ it as The Blue Water. I am now trying a new hybrid title — The Torwood Blue\
    \ Water Pool."
  replies: []
