    date: '2011-10-16T10:51:33+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_014.png
    content: "Looking at the footage again and you have to wonder what is \nholding\
