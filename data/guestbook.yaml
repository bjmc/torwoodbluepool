- id: 33
  author: David Hunter
  date: '2010-05-02T09:22:35+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "2nd May 2010 I David Hunter from Torwood now have the answer to \nyour\
    \ question. I have just found a second red brick air vent with square\n manhole\
    \ next to it,this is now giving the correct answer to what the \nblue water is.\
    \ This is perfactly in line with carbrooke clay mines \nmain,this to to difficult\
    \ to explain will post photos soon.\n\nThe web site you need to go onto is type\
    \ in carbrooke clay mine \ntorwood and then click into Scotlands place record\
    \ page Carbrooke Clay \nMine, you will then see the pictures click onto the one\
    \ with the pit \nentrance and if you follow the picture the second blue water\
    \ is right at\n the bottom.\n\nI can now confirm this is the same diametre as\
    \ the blue water,also \nthe same brick there is also slate. Clay is also around\
    \ the external of \nthe wall,the square has cast iron pipes!Have no idea what\
    \ it is seems to\n be full of some kind of oil! Both of these have been filled\
    \ in with \nsoil, location the old Carbrooke stables.\n\nJust done some more research\
    \ the Carbrook Clay Mine opened in 1953 so\n it really rules out that they were\
    \ for the mine!So back to square one \nthe next theory was why are there are two\
