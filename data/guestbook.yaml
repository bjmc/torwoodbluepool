    \ temp – melting frost)\n\nEvidence of digging to N.W. of pool/shaft. At least\
    \ two sites, furthest being up to 15m away from subject.\n\nEvidence of previously\
    \ unseen foreign material white in colour (white clay?) within pool/shaft around\
    \ the part of archway.\n\nDamaged/deformed shaped iron/steel key (approx. 2m +\
    \ long) noticed \nlying beside inspection/valve pit to south-east of pool/shaft.\
    \ Said pit \nstill waterlogged from 600mm below top.\n\nMany cut lengths of birchwood\
    \ lying around the pool/shaft.\n\nThis inspection/valve pit must have something\
    \ to do with the main subject."
