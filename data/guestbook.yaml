  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_017.png
  content: "I have recently visited the pool and stumbled over your site. Not\n sure\
    \ if it is relevant but when I was a kid, about 20 years ago we used\n to play\
    \ about in the old RSNH particularly around Larbert House and the\n Loch. Anyway\
    \ I remeber one day we were at the front of the house and \nwalked down to the\
    \ Loch we crossed the road and jumped the fence and \nthere was the tops of an\
    \ arch that looked like it had been eroded away \nby rain. There was a big enough\
    \ gap for us to get our heads in and we \ncould see that the part of the brick\
    \ arch we could see was only a tiny \npart of a much bigger archway, beyond there\
    \ was a massive tunnel heading\n towards the house, I remember thinking it was\
    \ so big you could fit a \ntruck in it. I remember the brick work was similar\
    \ to the brick work \nround the blue pool but not sure if this has anything to\
    \ do with it. A \nfew weeks later we went back and the hole had been recovered.\
    \ I also \nremember what we called an ice house bring behind Larbert house, similar\n\
    \ sort of brick work again."
  replies:
  - id: 59
    author: Nigel Turnbull
    date: '2010-08-29T10:06:27+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks Craig. An amazing observation. I can’t imagine what such a\n\
      \ large arch near the house would have been for — maybe a nuclear shelter\n\
      \ from the cold war  . Even if it turns out to have nothing to do with the Blue\
      \ Water Pool, it \nis certainly worth recording for local interest. Ice Houses\
      \ are fairly \ncommon, in fact it was one suggested possibility for the Blue\
      \ Water \nPool, early on in the investigation."
    replies: []
