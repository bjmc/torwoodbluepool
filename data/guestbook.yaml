      \nI’ll throw another theory into the ring and say that this may not be a\n tunnel\
      \ at all but a roofed over sunken structure. The ‘roof’ might only\n be a couple\
      \ of feet below the heather to the north of the shaft/pool.\n\nThe film is fascinating."
    replies: []
  - id: 99
    author: Nigel Turnbull
    date: '2011-10-17T10:52:10+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for that Robert. I will keep the team effort idea in mind \n\
      for the future but most of the stuff I have done so far has been a one \nor\
      \ two person job. Although my brain is screaming ‘Tunnel’, the only photographic\
      \ evidence,\n at the moment, is of a black void that could indeed be another\
      \ chamber. The roof of the ‘maintenance chamber’ would be about two by three\
      \ metres\n and could take the form of a concrete slab or framed H-beam steel\
      \ with a\n manhole cover for entry. It could be arched in to a circular hole\
      \ with \nmanhole cover. I was surprised that I did not see metal ladder rungs\
      \ embedded on one of the walls. I was emailed by ‘Obsidian’, who suggested a\
      \ model submarine. I had \nthought of designing a submersible platform with\
      \ camera and lights but \ndecided it would probably take me for ever and cost\
      \ more than I could \nafford. If anyone out there already has a similar device\
      \ and would like \nto give it a workout then please get in touch. Lots of people\
      \ have suggested getting a diver down there but we have \nmore unknowns than\
      \ knowns — what if the apparent bottom of the Pool, at 5\n metres, is just some\
      \ wedged debris build up and the real depth is 100 \nmetres? I don’t think that\
      \ is likely but it is a possibility. Nigel"
    replies:
