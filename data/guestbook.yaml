- id: 23
  author: Eric Flack
  date: '2010-02-05T09:12:42+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_019.png
  content: "If it was to do with mining the iron content of the water would \nbe much\
    \ higher. I suggest a water supply of some sort.The bricks would \nsuggest a late\
    \ 19th century period."
  replies:
  - id: 24
    author: Nigel Turnbull
    date: '2010-02-08T09:13:34+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks Eric — I note your observation on the iron content but I \ndon’t\
      \ have the expertise to comment. There was a fair bit of Ironstone \nmining\
      \ around Dunipace. When the seams were exhausted, the same pits \nconcentrated\
      \ on the coal strata. I agree with your proposed date.\n\nThanks Cameron — I\
      \ think it would depend on the particular mine and \nstrata. In the nearby town\
      \ of Falkirk, some of the earliest piped water \nsupplies were drawn from redundant\
      \ mines. It was an offence to source \nwater from a working mine, though this\
      \ did occasionally happen with \nunfortunate results.\n\nRegards, Nigel"
    replies: []
- id: 25
  author: alan
  date: '2010-02-21T09:14:11+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "Hi there Nigel I lived in torwood for 20 years ,my mum still lives there\
    \ and I go visit her all the time. I remember the blue pool when I was a liitle\
    \ lad and the water level was\n always crystal clear and the level varied from\
    \ time to time when we \nwent up to look. We would walk the path to denoven quite\
    \ regular and always look at the \nblue pool just because we had never seen anything\
    \ like it anywhere \nbefore. I remember the planks across the pool, there were\
    \ a few and some were at\n the bottom. The water has always been crystal clear\
    \ every time I seen \nit but we never really knew what its purpose was for, the\
    \ arch has \nalways been a mystery to me as well so I was quite excited when I\
    \ found \nyour page and the other peoples comments. The first time I seen the\
    \ blue pool would have been around 1979 and as I still live local I stil go up\
    \ from time to time ."
  replies: []
- id: 26
  author: David Hunter
  date: '2010-03-14T09:14:52+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "Great reading about the “Blue pool”. I used to swim in this pool \nas\
    \ a kid (30+ yrs ago), and we all new it as “The Blue Water”. I was \ntold about\
    \ this site only today ( thanks Jane) and thought I would have a\n look as I have\
    \ only recently started walking back int this area over \nthe past few months.\
    \ The thing I remeber about the “Blue “Water” was \nthat if you throw a small\
    \ stick into the pool it would immediately sink \nto the bottom, I tried this\
    \ out again just last week and the same thing \nhappened. The earlier post that\
    \ states that this was a sewage stank does\n make me shiver at the thought of\
    \ swimming in there however that would \nprobably explain my rapid receeding hairline\n\
    \nWas up at the “Blue Water” earlier this evening and again threw in a \nstick,\
    \ guess what? it floated, tried it again and again and it kept \nfloating , so\
    \ I guess that makes a nonsense of my earlier post. One good\n thing, the water\
    \ was very clear which made it quite easy to see the \narch."
  replies: []
- id: 27
  author: David Hunter
  date: '2010-04-03T09:16:25+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "Hi Nigel, as discussed when we bumped into each other last week \nup at\
    \ the pool. The local man is Davy McArtney, worked at Todd Hill farm\n all his\
    \ days and is now in his late 70′s. I spoke to Davy in the passing the other night\
    \ and he remembers the pool\n very well. Davy told me that this used to be used\
    \ as a water supply for\n the surrounding farms. This water supply was for the\
    \ cattle only as the\n farm dwellings had a seperate water supply. The pool serviced\
    \ many \nfields and has many lead pipes leading from it that ran to various \n\
    troughs. The pool was covered over over and was in fact a shed, that is where\
    \ you\n will have gotten the slate and the cast pipe from. The only person that\n\
    \ had access to this structure back then was the old game keeper who had a\n key\
    \ to the shed and used to regulate the water to the fields by \nadjusting some\
    \ valves.\n\nI only got a brief run down from Davy as I was in a hurry however\
    \ he \nhas said that he will try and give me a detailed sketch of the layout of\n\
    \ the pool and pipe work. I will also get confirmation of the game \nkeepers name.\n\
    \nRegards\n\nDavid"
  replies:
  - id: 28
    author: Nigel Turnbull
    date: '2010-04-03T09:18:10+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks very much for that David – a very interesting lead indeed. I\
      \ have removed David McCarney’s (contact) details from this post. Sounds like\
      \ he was working at Todhill from around 1950. The shed is fascinating and would\
      \ certainly explain flat slates and half round guttering and planks of wood.\
      \ The curved metal casting (similar to OG guttering) would not be so easily\
      \ explained by the above.\n\nIt is possible that the Blue Pool had a change\
      \ of use/purpose during its lifetime. I have several witnesses (including myself)\
      \ from the early sixties who \nremember the Pool looking much the same as today\
      \ and nobody recalled a \nshed so it may have been damaged by storm or dismantled\
      \ towards the end \nof the 1950’s The description would contradict an account\
      \ I already have (only one \nwitness) of the pool looking the same in the 1930’s\
      \ as it does now – \nunless it was a short lived shed built at the end of the\
      \ 30’s I will certainly contact David McCartney at the suggested location but\
      \ that will be about two weeks away. I will try to get a quick update uploaded\
      \ to the web page soon."
    replies: []
