    content: "Thanks for that Ken. The blue pool is a circular hole in the \nground\
      \ with a big arch at the bottom and looks very similar to a Lime \nKiln or Charcoal\
      \ Kiln. Other than the Blue Pool build quality being much\n higher than any\
      \ Kiln I have seen, our big arch, which would be the \ndoorway, is 5 metres\
      \ below ground level and would make for some very \nawkward access — mind you,\
      \ I still quite like the Charcoal Kiln theory. There was an old lime mine and\
      \ kiln just half a mile from the Blue Water\n Pool — my new politically correct\
      \ name  — nothing remains of that kiln.\n There was a clay mine to the north\
      \ — it supplied material for Stein’s \nRefractory works near Bonnybridge. There\
      \ were a couple of stone quarries\n that supplied the building industry from\
      \ Edinburgh to Glasgow. Other \nthan that, this area has been pretty barren\
      \ of structures on the old \nmaps."
