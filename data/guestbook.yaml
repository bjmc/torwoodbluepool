  author: James Milne
  date: '2011-10-25T11:02:54+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_012.png
  content: "Right, now this is me thinking out loud – I’m probably spouting \nstuff\
    \ you guys have already thought of or gone through, but maybe my \nrandom muttering\
    \ may spark an idea\n\nHousing for a Beam Engine – these beams are massive and\
    \ usually the \nwalls to house the beam were a structural support for the MASSIVE\
    \ beam –\n these buildings, all over the UK are still standing – why would some\
    \ \none have employed considerable effort to remove all trace of this ? So I\n\
    \ think this is doubtful.\n\nI think (and I’m probably wrong) that the lack of\
    \ colour to the \nwater, suggests that its not iron related, by iron I’m thinking\
    \ \nironstone (siderite rich layers in the carboniferous ?) or coal or fire \n\
    clay – fireclay is the soil beneath the coal this is often sideritic \n(iron carbonate)\
    \ Somebody correct me if I’m wrong here. So I’m being \ncontoverisal here – but\
    \ I’m thinking its not mine related. However: http://www.flickr.com/photos/peteredin/sets/72157619070376639/with/3589621753/\
    \ THis shows two pictures of water from Birkhall mine one with heavily stained\
    \ water the other not …. But there is also a lack of machinery for ventilation\
    \ – maybe it \npredates mechanical ventilation – maybe relying on its height above\
    \ sea \nlevel to act like a chimney and draw the air through the mine\n\nType\
    \ vertical air shaft into google images and the only things that \nlook like Torwood\
    \ are canal air shafts or railway airshafts which do \nlook very similar http://en.wikipedia.org/wiki/File:Preston_Brook_air_shaft_north.jpg\
    \ but all stand proud of the ground…..and torwood looks like it has a \ndressed\
    \ brick finished top layer at ground level…shout out if you think \nnot. This\
    \ is a cracker: http://www.myspace.com/phill.d/blog/499903956\n\nPossible indications\
    \ for a water course design : Manhole – what the heck is the manhole for? Inspection\
    \ or mechanical \non/off switches as the main structure holds something you cant\
    \ get into –\n it looks suspicially watery to me The pipes look like water pipes\
    \ with recesses in them that I wonder is for a grill. The tunnel appears to head\
    \ off on a heading that seems to contour the \nhill..BUT your at the 100m contour\
    \ – can you contour round the M80 to \nthe Loch Colter or North Third reservoir\
    \ ? Have a look at this website: http://commons.wikimedia.org/wiki/File:Air_shaft_beside_Barden_Road_-_geograph.org.uk_-_513592.jpg\
    \ could this be an analogue ?\n\nIs the pool a controling (manhole)/ regulating\
    \ header tank to for a \ndrinking water supply to the rapidly industrialising\
    \ Denny/Stenhousemuir\n area ?\n\nAny thoughts?\n\nHow to get proof ?"
