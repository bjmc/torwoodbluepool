  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
  content: "Note to Heather from Canada. Thanks for the info and photos. My digital\
    \ camera records date and time in the ‘file info’. Your photographs of the pool\
    \ were taken on 20 April 2007. That was just \nfive days after I took my photos\
    \ of the pool. It’s a small world is it \nnot  ?"
  replies: []
- id: 6
  author: Ian & Agnes Bowie
  date: '2009-08-22T18:11:48+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_027.png
  content: "Could this man made structure not be a remnant of the now closed company\
    \ “Torwood Brick and Fireclay Ltd”\n\nWe remember arranging insurance for a company\
    \ in Denny (can’t \nremember the name} but their job was to reclaim the linings\
    \ of kilns \nfrom old works. Could it have been the case that there was a structure\
    \ \nabove the ground and it was only removed to ground level?"
  replies:
  - id: 7
    author: Nigel Turnbull
    date: '2009-08-23T18:13:51+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for the input Agnes. The only reference I can find to the Torwood\
      \ Brick and Fireclay Co. is a site owned by Bonnybridge Silica & Fireclay Co.\
      \ http://canmore.rcahms.gov.uk/en/site/140166/details/carbrook+clay+mine/ (Carbrook\
      \ Clay Mine — alternate name, Torwood Mine) and located, I \nthink, north of\
      \ Torwood and quite some distance from the Blue Pool. It \nclosed in 1982, which\
      \ may have tied up with the time you refer to.\n\nMore importantly, it was only\
      \ opened in the 1940’s http://www.falkirk.gov.uk/services/community/cultural_services/museums/archives/finding_aids/PDFs/business/brickmaking.pdf\
      \ and we know the pool was already there in the 1930’s — I suspect the pool\
      \ is actually a lot earlier than 1930. Regards, Nigel"
    replies: []
- id: 8
  author: Eilen Livingston
  date: '2009-08-23T18:17:50+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_008.png
  content: "The only thing l can say for sure is the pool doesn’t just fill \nup with\
    \ rain water and then evaporate to change levels. l have been up \none day and\
    \ the level has been about 4 feet (1m) from the top. However, \nthe very next\
    \ day it was full to the brim. There was no rainfall through\n the night and even\
    \ if there had been it would never have been that \nmuch! The same thing has happened\
    \ the other way round (full one day – 1m\n below the next)"
  replies:
  - id: 9
    author: Nigel Turnbull
    date: '2009-08-24T18:21:06+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: An interesting and important observation Eileen. I have inserted it into
      the main text and added a few deductions.
    replies: []
- id: 10
  author: Sandie
  date: '2009-09-11T18:22:48+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "I just wanted to say how interesting reading all about the blue \npool\
    \ has been, I came across this site quite by accident, whilst looking\n for info\
    \ on how to clear green water from an above ground splash pool. I\n would have\
    \ loved to have swam in your blue pool when it was an aqua \nmarine colour as\
    \ some one stated it was. I would love to find out if you\n ever did really find\
    \ out its origins. good luck"
  replies:
  - id: 12
    author: Nigel Turnbull
    date: '2009-09-14T18:25:43+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Dear Sandy from Suffolk, Glad you enjoyed your read. We have not yet\
      \ discovered the secrets of \nthe Blue Pool but the investigation is very much\
      \ ongoing as time and \nweather permit. I happened to be in nearby Fallin yesterday\
      \ and handed out a few \nleaflets. The people were very interested but nobody\
      \ had any immediate \nuseful input."
    replies: []
- id: 11
  author: David McLagan
  date: '2009-09-13T18:24:36+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "I first saw the pool around 1985 and my generation from Denny \nreferred\
    \ to it as the Witches Pool. It was a magnificent vivid blue \ncolour. I remember\
    \ that a fairly established tree line was a matter of \nmetres from the pool but\
    \ not up close as it is today. My brother has \nswum in it. I last saw the pool\
    \ around 2005 and it looks more blue in the winter \nthan in the summer. I tended\
    \ to only go there on good days so the blue \nsky may have been a factor. One\
    \ winter I remember seeing leaves on the \nbottom and they looked like silver."
  replies: []
- id: 13
  author: Stuart
  date: '2009-10-11T18:27:14+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536.png
  content: "Walked to this pool in the summer on the way to the Broch. On the\n assumption\
    \ that it’s probably not a unique structure, you would tend to\n look elsewhere\
    \ for something similar? Having had a scout around it \nlooks like a early-mid\
    \ or late 1800′s cesspit which would be consistent \nwith the height of the pipe\
    \ and the story of the old beehive roof. Given\n the Carron ironworks was the\
    \ largest smelting works in europe from \n1800′s onward, employing over 1000 people\
    \ this might make sense as they \nowned the land and would not have had modern\
    \ drainage to start with.\n\nIf you do a search for archeological cesspit design\
    \ (not that I make a\n habit of it) you can find similar types of builds, the\
    \ link below is a \nsmaller build but could indicate it’s the same type of construction.\n\
    \nhttp://www.community-archaeology.org.uk/projects/UnderstandingOspringe/K48rep.htm\n\
    \nHave you had the sediment at the bottom tested for traces of sewage? (until\
    \ you do, I wouldnt swim in it  )\n\nVery interesting though, good luck.\n\nBrgds\
    \ Stuart"
  replies:
  - id: 14
    author: Nigel Turnbull
    date: '2009-10-15T08:59:03+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for taking the time to do that Stuart. I am sure there are\n\
      \ people who have swum in the Blue Pool and now are reading this while \nscratching\
      \ themselves raw. Although Carron Company owned Torwood, they were only interested\
      \ in the \nminerals underground. There are no houses shown in the area of the\
      \ pool \non any old Ordnance Survey Maps. Carron Iron Works was 3 miles away\
      \ and I\n am sure the workers would have lived near the works. The nearest dwellings\
      \ to the pool (new map further up page) were Torwood\n Castle, Denovan House,\
      \ Doghillock, Kirkland and Todhill. All of these \nbuildings are at least half\
      \ a mile from the pool but more importantly \nthe pool is at a higher elevation\
      \ than any of the buildings and you \nwould need a lot of Brussels Sprouts in\
      \ your diet to force your effluent\n up that pipe. I hope this stops everyone\
      \ scratching themselves. Keep \nthe ideas coming — it’s far from a one-horse\
      \ race. Nigel"
    replies: []
- id: 15
  author: Eileen Livingston
  date: '2009-12-02T09:01:45+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_008.png
  content: "l can cleary remember the wooden plank you found. Back in the mid\n eighties\
    \ l can remember the fun we had holding it vertically and then \npushing it down\
    \ so we could then see it shoot back up in the air from \nthe top of the pool.\
    \ (oh how easy it was to amuse youngsters back then \ncompared to now!)Though\
    \ l’m certain they were at least 2 planks, maybe \nas many as 3. Maybe they are\
    \ stuck somewhere below too."
  replies:
  - id: 16
    author: Nigel Turnbull
    date: '2009-12-02T09:03:02+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for that Eileen. Did the plank have a taper on it that you remember?\
      \ The other planks were probably taken away by someone who needed planks for\
      \ a building project. The taper on the remaining plank has me wondering — can’t\
      \ imagine anyone\n passing an afternoon whittling a 10×2 plank over a 6 foot\
      \ length. I have been told there was a fire in the area at some point. I wonder\
      \ if\n the plank was partially sticking out of the water and was burned away\
      \ \nmost at the point furthest from the water. I dare say the Fire Department\
      \ might have a record of the fire. It might\n be worth contacting them in case\
      \ they have any worthwhile knowledge of \nthe pool — other than it being an\
      \ available emergency water supply and \nfire fighting asset."
    replies: []
