- id: 20
  author: natalie Cooper
  date: '2010-01-20T09:08:13+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "My boyfriend is from banknock and remebers going for a walk when \nhe\
    \ was a wee lad(about 30 years ago) with his dad to torwood castle. He \nalso\
    \ remembers seeing a ‘well’ which i assume is the blue pool. his \nmemory of it\
    \ when he looked in the pool there seemed to be small brick \narchways in the\
    \ pool with tunnels leading away from it. I can see from \nthe pictures that sediment\
    \ has formed and the botom is no longer \nvisible. His father was told that the\
    \ pool is fed by a natural spring \nand it was mentioned it was a source of water\
    \ for a nearby hospital. \njust another take on the discussions. He also mentioned\
    \ a nearby cave known as ‘wallaces cave’. he recommends a\n visit as its still\
    \ a vivid childhood experience for him. i recently \nwent to torwood castle and\
    \ was very impressed by the beautiful building \nbut have yet to see the pool."
  replies:
  - id: 21
    author: Nigel Turnbull
    date: '2010-01-20T09:09:06+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Dear Natalie, Thanks for your input. You are obviously aware that we\
      \ found and photographed (part of) the predicted brick arch. My ears fair *******\
      \ up when you used the plurals archway(s) and tunnel(s) — that’s a first for\
      \ this investigation. There’s a lot of rising water breaks the surface in the\
      \ Torwood area. \nThe old maps show several ‘Rises’ and one ‘Spring’. If the\
      \ Blue Pool is \nconnected to old mine workings, it could be that the workings\
      \ are now \nflooded. Wallace never visited the cave that takes his name. I too\
      \ remember it \nfrom my youth. It is actually a very old mine working and definitely\
      \ an \nunsafe place to be going anywhere near these days. The opening is in\
      \ a \ncrumbling rock face and large chunks have fallen off fairly recently.\
      \ Best just to visit Wallace’s Monument\n\nmmm I see the over exuberant auto-censor\
      \ has changed my perfectly \ninnocent word, describing the action of my ears,\
      \ into something \nsinister."
    replies:
    - id: 182
      author: Rob Lowe
      date: '2013-06-23T22:36:17+00:00'
      avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_031.png
      content: "Hi,\n\nI was just skimming your blue pool website. I noticed you refer\
        \ to \nsprings and uprising sources of water. I’m VERY interested in this,\
        \ we \nare currently trying to convince the govt to object to coal Sean gas\
        \ \ndrilling under torwood, Larbert and plean. One major concern is gas \n\
        escape via old workings and contamination of the water table. An upward \n\
        flow of water could indicate a significant subterranean feature. Could \n\
        you please tell me more….\n\nRegards,\n\nRob"
      replies:
