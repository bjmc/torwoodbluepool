  content: "Thanks Matt. I tried some thin brass rods with amazing results. I\n tried\
    \ them again with erratic, conflicting and inconsistent results. \nAfter a bit\
    \ it seemed that if the vertical part of the rod (the bit in \nthe hand) varied\
    \ even a fraction from the vertical then the long \nhorizontal part would swing\
