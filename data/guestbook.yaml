    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Hi Stephanie/David,\n\nI certainly liked the charcoal kiln idea at one\
      \ time but having the \narched doorway five metres down in bog-land does not\
      \ seem very \npractical.\n\nI am sure the main clue in the Blue Pool is the\
      \ brick arch – does it \ntravel one metre or a thousand metres ? – the latter\
      \ would have to be a \nventilation shaft and tunnel. Once I get the weed cleared\
      \ from inside the arch, I hope to get a camera\n down and take a look along\
      \ the arch – hopefully the whole length will \nnot be choked with weed. I would\
      \ expect it to slope downwards at a \nfairly steep angle if it was a ventilation\
      \ tunnel.\n\nI am really interested in how your Carbrook project goes so please\
      \ \nkeep me informed. I don’t think I have your email yet. I met a local \n\
      guy, James, yesterday when I responded to your find. He says his dad has\n a\
      \ print of a painting of Carbrook House. James was adamant (and his dad\n insists)\
      \ that the nearby building was a Coach House and never to be \ncalled Stables\
      \ – be warned! James seemed to think the land was currently\n owned by the people\
      \ who used to have Jones Sawmill."
