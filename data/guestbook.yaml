- id: 67
  author: Kenny
  date: '2011-02-15T10:14:41+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "Was up walking the dog today and had a wee nosey at another curio id noticed\
    \ on google maps…. http://\nmaps.google.co.uk/maps?\nhl=en&ie=UTF8&ll=56.039232,-3.878578&spn=0.001537,0.004801&t=f&z=18&ecpose=56.03906492,-3.87857821,481.48,0,2.92,0\n\
    \nAlmost a third of a mile north of the “blue pool” is a near perfectly\n circular\
    \ pond with an islan in the middle, the sorta thing you see in \nornamental/landscaped\
    \ gardens or in a park round a country house. No \nhouse nearbye and it is sitting\
    \ in the middle of recently cleard \nforestry commision ground??? Some link between\
    \ the two???(either \nhistoically or physically??)"
  replies:
  - id: 68
    author: Nigel Turnbull
    date: '2011-02-15T10:17:40+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Well spotted Kenny (no pun intended). It is a strange shaped pool\n\
      \ indeed. It can just be spotted on Google Satellite but is not indicated\n\
      \ on Ordnance Survey maps. It is about the same level as our Blue Water \nPool.\
      \ I could not even hazard a guess as to whether it is a natural \nfeature or\
      \ not. Just to the east of this ‘Doughnut Pool’, is an old \nrusty metal storage\
      \ vessel shaped like a kettle drum about 3 feet in \ndiameter and about the\
      \ same in depth. Another unexplained item just \nlying about!"
    replies: []
- id: 69
  author: Robert M.
  date: '2011-02-16T10:22:30+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "It may have escaped your notice but the beehive structure you \nposit\
    \ is reminiscent of Arthur’s O’On, a Roman building located in the \nsame parish\
    \ (recorded but demolished in 1743). It’s possible that the \nthe local gentry\
    \ were imitating that structure (of which they would have\n been doubtless aware)\
    \ if they built the cap to the pool. Iadmit this is\n wild speculation but it\
    \ could be worth a look.\n\nAnyway, here is a url on this if you are interested\n\
    \nhttp://canmore.rcahms.gov.uk/en/site/46950/details/arthur+s+o+on+stenhouse/"
  replies:
  - id: 71
    author: Nigel Turnbull
    date: '2011-02-16T10:26:20+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for that rather fascinating idea Robert. Someone could \nindeed\
      \ have been emulating Arthur’s O’on (Oven). I did notice when I \nchecked the\
      \ details a moment ago that the internal diameter of Arthur’s \nO’on is the\
      \ same as the Blue Water Pool which is exactly 20 feet. The O’on is another\
      \ local mystery. The favourite theory seems to be a \nTemple. I spoke to an\
      \ ex Carron employee a few weeks ago. He was a Works\n Manager who was often\
      \ in the field overseeing various projects. He \nlives in and knows the area\
      \ well. He has an interesting alternative \ntheory that I have never before\
      \ heard mentioned. He knows that there is \nan abundance of clear spring water\
      \ flowing from the nearby hill and he \nreckons the O’on may have been a Roman\
      \ Well."
    replies: []
- id: 70
  author: Kenny
  date: '2011-02-16T10:25:41+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "I did notice the rustred “drum” whilst walking my dog yesterday. \nHaving\
    \ walked out to the round pond it is (in my opinion) definately not\n a natural\
    \ feature. If you have a look at in on Bing Maps you can see \nwhat looks like\
    \ an embankment round the pond. As for the blue pool, in \nthe woods to the north\
    \ east there appears to be visible on google earth \nwhat potentially could be\
    \ the ruins of some sort of building???\n\nhttp://maps.google.co.uk/maps?hl=en&ie=UTF8&ll=56.03626,-3.87856&spn=0.000769,0.002401&t=h&z=19\n\
    \nIn the middle of the map (in a small clearing) you can see what looks\n to be\
    \ a wall travelling from north to south then turning 90 degrees and\n then running\
    \ off to the east before dissapearing back under cover of \nthe trees.???"
  replies:
  - id: 72
    author: Nigel Turnbull
    date: '2011-02-16T10:27:22+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "I see the north south line Kenny but I can’t make out what it is.\n\
      \ Just as interesting is the bare earth in that area. I recently spoke to\n\
      \ an ex local ploughman 1955-70 about the Blue Pool but after ten minutes\n\
      \ of misunderstanding, it transpired that he had never seen the Blue Pool\n\
      \ and was referring to a small brick building about 8 feet square with a \n\
      flat concrete roof and a locked door. On one occasion when the Game \nKeeper\
      \ had the door open to adjust a valve controlling water to several \ncattle\
      \ troughs, this chap saw inside. He said he looked down into a hole\n and saw\
      \ water running through. He could not remember exactly where the \nbuilding\
      \ was after all these years but his best guess put it round about\n the area\
      \ you highlighted with the north south line."
    replies: []
- id: 73
  author: cell
  date: '2011-02-17T10:28:13+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "There issomedebate over on the hidden glasgow site about this \npool,\
    \ latest thinking is that it is alint or retting pool for soaking \nflax prior\
    \ to processing. Cheers Cell"
  replies:
  - id: 74
    author: Nigel Turnbull
    date: '2011-02-17T10:29:15+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for the input on a possible flax soaking tank. I discussed\n\
      \ that idea with some people, from the Falkirk Local History Society, who\n\
      \ had knowledge of the Flax Process. Their opinion was that flax was \nsoaked\
      \ in any hole in the ground that had fortuitously filled with \nwater. The Torwood\
      \ Blue Water Pool was a very expensive and expertly \nbuilt piece of engineering\
      \ with a big arch. That said, no ideas are \ndiscarded here — you never know\
      \ what pieces of the puzzle will \neventually just drop into place."
    replies: []
- id: 75
  author: Steven Douglas
  date: '2011-02-17T10:30:08+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_024.png
  content: "May I throw my tuppence in. When I was a lad, I lived in Antrim in northern\
    \ ireland, there was loads\n of old ruined flax mills everywhere, (anyone who\
    \ knows Antrim knows \nwhere they are) close by a lot of these old mills there\
    \ was/is simaler \nlooking pools but they where square shaped. . There is one\
    \ not far from \nmy mums house, last time I was down at that one it had no water\
    \ in it. \nbut that was over 15 years ago. We where told as kids not to go near\
    \ them as they could be dangerous, \nespecially if full of water, so naturally\
    \ a curious 12 year old had to \nexplore these big pools and old mills. I hope\
    \ that helps a bit in \nsolving the mystery."
  replies:
  - id: 76
    author: Nigel Turnbull
    date: '2011-02-17T10:30:50+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Thanks for that Steven. It sounds like those tanks were custom \nbuilt\
      \ for the job. Can you remember how their build quality compared to \nthe Torwood\
      \ Blue Water Pool? I know very little of the process myself. As an interesting\
      \ wee aside, Torwood Castle has been a ruin since before\n the 1880’s and the\
      \ man who spent half his life restoring it, Gordon \nMillar, reckoned that the\
      \ final demise of the castle was caused by a \nfire that started in bales of\
      \ flax in the ground floor vaulted rooms. I \ndoubt that the building was still\
      \ in use as a dwelling house at that \npoint."
    replies: []
- id: 77
  author: Robert Murray
  date: '2011-02-17T10:32:17+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "Have you given any time to considering the elevation of the pool?\n and\
    \ how it is almost on the same 100m contour line that a few field \ndrains can\
    \ be seen around the hill to the south and east. These drains \nappear to flow\
    \ down to a pond just above the Denovan Road and from which\n a burn flows down\
    \ to the Carron. Was there a mill on the river at this point that needed as much\
    \ water as\n possible especially in times of drought? It could be that this pond\
    \ was\n a storage reservoir or holding pond for such a mill, though not having\
    \ \nseen it I don’t know that for sure but it was common for mills to \nharness\
    \ as much water supply as they could get to ensure supply. I would advance the\
    \ theory – and it ties in with your water tank – that \nthe pool was a retention\
    \ tank for a water supply and if not to this \npossible mill possibly to your\
    \ earlier thoughts about supply the Larbert\n hospitals. I think that the clay\
    \ pipes may draw in water from surrounding land \n(weak part of the theory admittedly\
    \ ) but the main tank drew water from a\n natural spring at the base of it – hence\
    \ the clarity and absence of \nstagnation – which what you would be expect it\
    \ to be like – and that the\n water went through the tunnel to appear downhill\
    \ somewhere. Look for a \nculvert in the vicinty of Pampwellgoat Wood ……. maybe!\n\
    \nAll the best Nigel and happy hunting"
  replies:
  - id: 78
    author: Nigel Turnbull
    date: '2011-02-17T10:33:19+00:00'
    avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/a035cf2c0639fb938ff36d771f56392e.png
    content: "Sound reasoning Robert. Mills did indeed crave for water during \nthe\
      \ dry spells. The only mill that I know of that was down stream of the\n Blue\
      \ Water Pool was the Headswood Paper Mill, the lade for which has \npowered\
      \ mills on that site for a long time. The current overflow of the \nPool would\
      \ not make much difference to a water wheel though this may not\n always have\
      \ been the case. The ‘pool’ you refer to, just north of Denovan Road, is an\
      \ old quarry at\n an area called Salt Pans (that name is another mystery). The\
      \ stream \nrises at a point about half way between the Blue Water Pool and \n\
      Thorniedyke Quarry (now filled in) to the west. This is joined by, as \nyou\
      \ noted, several streams in the general area. The Salt Pans \nquarry/pool might\
      \ have been a good catchment reservoir for augmenting \nthe supply to Headswood\
      \ — I had never thought of that. To reinforce my water-tank theory, I tried\
      \ to explain away the huge arch\n by making it a filter or strainer housing.\
      \ I can just imagine the \nworker closing the valve after filling a large Bleaching\
      \ Vat at the \nCalico Print Works and then the Blue Water Pool taking several\
      \ hours to \nrecover its level. I also considered the Pool being a drainage\
      \ sump for surrounding boggy \nland — draining through 3 clay pipes and discharging\
      \ through the arch to\n a stream. All bets are very much still on."
    replies: []
- id: 79
  author: cell
  date: '2011-02-18T10:34:02+00:00'
  avatar: What%20We%20Know%20_%20Torwood%20Blue%20Pool_files/ad516503a11cd5ca435acc9bb6523536_023.png
  content: "The Canmore site has 28 records of retting ponds, some of which \nare\
    \ in the Falkirk area, with dates that are comparable with the \nappearance of\
    \ the Blue Pool construction. One has the following \ndescription although admitaly\
    \ the majority are not round.\n\n“A lint vat or tank used for the preparation\
    \ of flax at Cleuchhead \n(NY 098 957), known locally as ‘the lint hole’. An enclosure,\
    \ something \nlike a well only wider, 12′ across, 42′ in circumference and perhaps\
    \ 5′ \ndeep, is now filled up and planted over with trees. There is a stone \n\
    built conduit at the bottom, for the draining off of water after the \nline has\
    \ been ‘retted’ or steeped.”\n\nHave you had a look at the pictures of the similar\
    \ structure over on \nHidden Glasgow? I think it is near cumbernauld and might\
    \ be worth a \nvisit to compare."
  replies: []
